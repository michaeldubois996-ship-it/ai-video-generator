<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#08080E" />
  <link rel="manifest" href="/manifest.json" />
  <title>AI Video Generator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#08080E;color:rgba(255,255,255,0.9);font-family:'Courier New',monospace;min-height:100vh}
    textarea,input{font-family:'Courier New',monospace}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1F1F32;border-radius:4px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sp{width:32px;height:32px;border-radius:50%;border:2px solid rgba(124,111,255,0.2);border-top-color:#7C6FFF;animation:spin 0.8s linear infinite;margin:0 auto 12px}
  </style>
</head>
<body>
<div id="root"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:0.2em"><div class="sp"></div>CHARGEMENT…</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect}=React;
const IS_NET=!window.location.hostname.includes('claude')&&window.location.hostname!=='localhost';
const PROXY='/.netlify/functions/gemini';
const DIR=k=>`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`;
const MAX=3,SK={k:'vg_k',t:'vg_t'};
const C={bg:'#08080E',s:'#10101A',card:'#14141F',b:'#1F1F32',a:'#7C6FFF',cy:'#00DFFF',g:'#00E5A0',r:'#FF4C6A',o:'#FF9432',tx:'rgba(255,255,255,0.9)',m:'rgba(255,255,255,0.38)'};
const PR={style:['🎬 Cinématique','📽️ Documentaire','📱 Vlog','✨ Animé'],tone:['🔥 Motivant','📚 Éducatif','😄 Humoristique','🎭 Dramatique'],format:['📱 Portrait 9:16','🖥️ Paysage 16:9','⬛ Carré 1:1'],duration:['⏱️ 30 sec','⏱️ 1 min','⏱️ 2 min']};
const DS={'⏱️ 30 sec':30,'⏱️ 1 min':60,'⏱️ 2 min':120};

async function gem(apiKey,idea,style,tone,dur){
  const sec=DS[dur]||60,sc=Math.round(Math.max(3,Math.min(10,sec/8))),sps=Math.round(sec/sc);
  const p=`Tu es expert en vidéos courtes virales TikTok/Reels pour la Côte d'Ivoire (Abidjan).\nIDÉE:"${idea}"\nSTYLE:${style}|TON:${tone}\nDURÉE:${sec}s—${sc} scènes(≈${sps}s/scène)\nRÈGLES:\n1.Narration français ivoirien naturel(nouchi OK)\n2.Première scène=accroche choc\n3.keyword EN ANGLAIS pour Pixabay\n4.Texte oral uniquement\nRÉPONDS UNIQUEMENT JSON:\n[{"index":1,"narration":"texte","keyword":"english"},...]`;
  let res;
  if(IS_NET){
    res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,apiKey})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Erreur ${res.status}`);}
  }else{
    res=await fetch(DIR(apiKey),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:p}]}],generationConfig:{temperature:0.85,maxOutputTokens:1500,responseMimeType:'application/json'}})});
    if(res.status===429)throw new Error('Limite Gemini. Attends 1 minute.');
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`Gemini ${res.status}: ${e?.error?.message||res.statusText}`);}
  }
  const d=await res.json();
  if(!d.candidates?.length)throw new Error('Réponse bloquée. Reformule ton idée.');
  return JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim());
}

const e=React.createElement;
const cs=(x={})=>({background:C.card,border:`1px solid ${C.b}`,borderRadius:16,padding:'18px 20px',...x});
const rw=(j='flex-start',g=0)=>({display:'flex',alignItems:'center',justifyContent:j,gap:g});
const W={maxWidth:520,margin:'0 auto',padding:'28px 16px 80px'};

function Btn({ch,onClick,col=C.a,dis,sx={}}){return e('button',{onClick,disabled:dis,style:{background:`${col}18`,border:`1px solid ${col}55`,borderRadius:12,padding:'8px 16px',color:col,fontWeight:700,fontSize:13,cursor:dis?'not-allowed':'pointer',fontFamily:"'Courier New',monospace",...sx}},ch)}
function Badge({t,bl}){const c=bl?C.r:t<=1?C.o:C.a;return e('div',{style:{padding:'6px 13px',borderRadius:20,border:`1px solid ${c}`,background:`${c}18`,fontSize:11,color:c,fontWeight:700}},bl?'🔒 Limité':`${t} essai${t>1?'s':''}`)}
function Sheet({title,opts,cur,onSel,onCl}){return e(React.Fragment,null,e('div',{onClick:onCl,style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:10}}),e('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:520,background:C.s,borderRadius:'20px 20px 0 0',border:`1px solid ${C.b}`,padding:'20px 20px 40px',zIndex:11}},e('div',{style:{fontSize:10,letterSpacing:'0.3em',color:C.m,fontWeight:700,marginBottom:16}},title),opts.map(o=>e('button',{key:o,onClick:()=>onSel(o),style:{width:'100%',textAlign:'left',padding:'14px 16px',marginBottom:8,background:o===cur?`${C.a}18`:C.card,border:`1px solid ${o===cur?C.a:C.b}`,borderRadius:12,color:o===cur?C.a:C.tx,fontSize:14,fontWeight:o===cur?700:400,cursor:'pointer',fontFamily:"'Courier New',monospace",display:'block'}},o))))}

function Home({apiKey,tl,bl,inc,go}){
  const [idea,setIdea]=useState('');
  const [pm,setPm]=useState({style:PR.style[0],tone:PR.tone[0],format:PR.format[0],duration:PR.duration[1]});
  const [load,setLoad]=useState(false);
  const [step,setStep]=useState('');
  const [prog,setProg]=useState(0);
  const [sc,setSc]=useState([]);
  const [err,setErr]=useState('');
  const [cp,setCp]=useState(false);
  const [sh,setSh]=useState(null);

  async function gen(){
    if(bl){go('paywall');return;}
    if(!idea.trim()){setErr('Entre une idée !');return;}
    if(!apiKey){setErr('Configure ta clé dans ⚙️.');return;}
    setLoad(true);setErr('');setSc([]);setProg(15);setStep('🧠  Gemini rédige le script…');
    try{const r=await gem(apiKey,idea,pm.style,pm.tone,pm.duration);setProg(100);setStep('✅  Script prêt !');setSc(r);inc();}
    catch(ex){setErr(ex.message||'Erreur');setStep('');setProg(0);}
    finally{setLoad(false);}
  }

  return e('div',{style:W},
    e('div',{style:{...rw('space-between'),marginBottom:28}},
      e('div',null,e('div',{style:{fontSize:22,fontWeight:900,color:C.a,letterSpacing:'0.18em'}},'AI VIDEO'),e('div',{style:{fontSize:10,color:C.cy,letterSpacing:'0.4em',marginTop:2}},'SCRIPT GENERATOR')),
      e('div',{style:{...rw('flex-end',10)}},e(Badge,{t:tl,bl}),e(Btn,{ch:'⚙️',onClick:()=>go('settings'),sx:{padding:'8px 10px',fontSize:16}}))
    ),
    e('div',{style:{fontSize:10,letterSpacing:'0.28em',color:C.m,fontWeight:700,marginBottom:8}},'VOTRE IDÉE'),
    e('textarea',{value:idea,onChange:ev=>setIdea(ev.target.value),rows:4,placeholder:"Ex: Une vidéo motivante sur l'épargne pour les jeunes Ivoiriens…",style:{width:'100%',background:C.s,border:`1px solid ${C.b}`,borderRadius:14,padding:14,color:C.tx,fontSize:14,lineHeight:1.7,resize:'vertical',outline:'none',marginBottom:20},onFocus:ev=>ev.target.style.borderColor=C.a,onBlur:ev=>ev.target.style.borderColor=C.b}),
    e('div',{style:{fontSize:10,letterSpacing:'0.28em',color:C.m,fontWeight:700,marginBottom:8}},'PARAMÈTRES'),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8,marginBottom:24}},
      Object.keys(PR).map(k=>e('button',{key:k,onClick:()=>setSh(k),style:{background:C.s,border:`1px solid ${C.a}44`,borderRadius:12,padding:'11px 13px',color:C.tx,fontSize:12,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:8,fontFamily:"'Courier New',monospace"}},e('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},pm[k]),e('span',{style:{color:C.m}},'›')))
    ),
    e('button',{onClick:gen,disabled:load,style:{width:'100%',height:56,borderRadius:14,border:'none',background:load?`${C.a}44`:`linear-gradient(135deg,${C.a},${C.cy})`,color:'#fff',fontSize:14,fontWeight:900,letterSpacing:'0.12em',cursor:load?'not-allowed':'pointer',boxShadow:load?'none':`0 8px 28px ${C.a}44`,marginBottom:20,fontFamily:"'Courier New',monospace"}},load?'⏳  GÉNÉRATION…':bl?'🔒  PASSER PREMIUM':'⚡  GÉNÉRER LE SCRIPT'),
    (load||(prog===100&&step))?e('div',{style:{...cs({marginBottom:16})}},e('div',{style:{color:C.cy,fontSize:13,fontWeight:700,marginBottom:10}},step),e('div',{style:{background:`${C.a}22`,borderRadius:6,height:6,overflow:'hidden'}},e('div',{style:{height:'100%',width:`${prog}%`,borderRadius:6,transition:'width 0.5s',background:`linear-gradient(90deg,${C.a},${C.cy})`}})),e('div',{style:{fontSize:11,color:C.m,marginTop:6}},`${prog}%`)):null,
    err?e('div',{style:{background:`${C.r}12`,border:`1px solid ${C.r}44`,borderRadius:12,padding:'13px 15px',color:C.r,fontSize:13,marginBottom:16}},`⚠️ ${err}`):null,
    sc.length>0?e('div',{style:{animation:'fadeUp 0.4s ease'}},
      e('div',{style:{...rw('flex-start',10),flexWrap:'wrap',background:`${C.g}0A`,border:`1px solid ${C.g}33`,borderRadius:12,padding:'12px 16px',marginBottom:14}},[`✅ ${sc.length} scènes`,pm.duration,pm.style].map(t=>e('span',{key:t,style:{fontSize:12,color:C.g}},t))),
      sc.map((s,i)=>e('div',{key:s.index,style:{...cs({marginBottom:12}),borderLeft:`3px solid ${i%2===0?C.a:C.cy}`}},e('div',{style:{...rw('space-between'),marginBottom:10}},e('span',{style:{fontSize:10,fontWeight:900,letterSpacing:'0.2em',color:i%2===0?C.a:C.cy}},`SCÈNE ${s.index}`),e('span',{style:{fontSize:10,background:`${C.g}18`,border:`1px solid ${C.g}44`,borderRadius:20,padding:'3px 10px',color:C.g,fontWeight:700}},`🔍 ${s.keyword}`)),e('div',{style:{fontSize:14,lineHeight:1.75}},s.narration))),
      e('button',{onClick:()=>{navigator.clipboard.writeText(sc.map(s=>`Scène ${s.index} [${s.keyword}]\n${s.narration}`).join('\n\n'));setCp(true);setTimeout(()=>setCp(false),2000);},style:{background:cp?`${C.g}22`:`${C.a}18`,border:`1px solid ${cp?C.g:C.a}`,borderRadius:12,padding:'12px 20px',color:cp?C.g:C.a,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:"'Courier New',monospace",width:'100%',marginTop:4}},cp?'✅ Copié !':'📋  Copier le script complet')
    ):null,
    sh?e(Sheet,{title:sh.toUpperCase(),opts:PR[sh],cur:pm[sh],onSel:v=>{setPm(p=>({...p,[sh]:v}));setSh(null);},onCl:()=>setSh(null)}):null
  );
}

function Sett({apiKey,save,go}){
  const [inp,setInp]=useState(apiKey);
  const [hide,setHide]=useState(true);
  const [sv,setSv]=useState(false);
  const [tst,setTst]=useState(false);
  const [res,setRes]=useState('');
  const doSave=()=>{if(!inp.trim())return;save(inp);setSv(true);setTimeout(()=>setSv(false),2000);};
  const doTest=async()=>{if(!inp.trim()){setRes('❌ Entre ta clé.');return;}setTst(true);setRes('');try{const s=await gem(inp.trim(),'test','📱 Vlog','📚 Éducatif','⏱️ 30 sec');setRes(`✅ OK ! ${s.length} scènes.`);}catch(ex){setRes(`❌ ${ex.message}`);}finally{setTst(false);}};
  return e('div',{style:W},
    e('div',{style:{...rw('space-between'),marginBottom:28}},e(Btn,{ch:'← Retour',onClick:()=>go('home')}),e('div',{style:{fontSize:12,color:C.m,letterSpacing:'0.2em'}},'PARAMÈTRES'),e('div',{style:{width:72}})),
    e('div',{style:cs({marginBottom:16})},
      e('div',{style:{fontSize:14,fontWeight:700,marginBottom:4}},'🔑 Clé Gemini API'),
      e('div',{style:{fontSize:12,color:C.m,marginBottom:12,lineHeight:1.6}},'Gratuite sur ',e('span',{style:{color:C.cy}},'aistudio.google.com'),' → Get API Key → Create API key'),
      e('div',{style:{position:'relative',marginBottom:12}},
        e('input',{type:hide?'password':'text',value:inp,onChange:ev=>setInp(ev.target.value),placeholder:'AIzaSy...',style:{width:'100%',background:C.s,border:`1px solid ${C.b}`,borderRadius:12,padding:'13px 44px 13px 14px',color:C.tx,fontSize:13,outline:'none'},onFocus:ev=>ev.target.style.borderColor=C.a,onBlur:ev=>ev.target.style.borderColor=C.b}),
        e('button',{onClick:()=>setHide(!hide),style:{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:C.m,cursor:'pointer',fontSize:16}},hide?'👁️':'🙈')
      ),
      e('div',{style:{...rw('flex-start',10),marginBottom:res?12:0}},
        e(Btn,{ch:sv?'✅ Sauvegardé !':'💾 Sauvegarder',onClick:doSave,col:sv?C.g:C.a,sx:{flex:1,height:44}}),
        e(Btn,{ch:tst?'⏳ Test…':'🧪 Tester',onClick:doTest,dis:tst,col:C.cy,sx:{flex:1,height:44}})
      ),
      res?e('div',{style:{padding:'11px 14px',borderRadius:10,fontSize:12,background:res.startsWith('✅')?`${C.g}12`:`${C.r}12`,border:`1px solid ${res.startsWith('✅')?C.g:C.r}44`,color:res.startsWith('✅')?C.g:C.r}},res):null
    )
  );
}

function Pay({go}){
  return e('div',{style:{maxWidth:520,margin:'0 auto',padding:'60px 20px'}},
    e('div',{style:{textAlign:'center',marginBottom:36}},
      e('div',{style:{width:80,height:80,borderRadius:'50%',margin:'0 auto 20px',background:`linear-gradient(135deg,${C.a},${C.cy})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}},'🚀'),
      e('div',{style:{fontSize:26,fontWeight:900,lineHeight:1.2,marginBottom:12}},'DÉBLOQUEZ',e('br'),"L'ILLIMITÉ"),
      e('div',{style:{fontSize:14,color:C.m,lineHeight:1.7}},'Vos 3 essais gratuits sont épuisés.')
    ),
    e('div',{style:{...cs({marginBottom:20,textAlign:'center'}),background:`${C.a}0A`,border:`1px solid ${C.a}44`}},e('span',{style:{fontSize:42,fontWeight:900,color:C.a}},'1,5$'),e('span',{style:{fontSize:16,color:C.m,marginLeft:8}},'/ mois')),
    e('button',{style:{width:'100%',height:56,borderRadius:14,border:'none',background:`linear-gradient(135deg,${C.a},${C.cy})`,color:'#fff',fontSize:14,fontWeight:900,cursor:'pointer',fontFamily:"'Courier New',monospace",marginBottom:14}},'💳  PASSER PREMIUM'),
    e('button',{onClick:()=>go('home'),style:{width:'100%',background:'none',border:'none',color:C.m,fontSize:13,cursor:'pointer',fontFamily:"'Courier New',monospace"}},'← Retour')
  );
}

function App(){
  const [sc,setSc]=useState('home');
  const [ak,setAk]=useState('');
  const [tr,setTr]=useState(0);
  useEffect(()=>{setAk(localStorage.getItem(SK.k)||'');setTr(parseInt(localStorage.getItem(SK.t)||'0',10));});
  const sv=k=>{localStorage.setItem(SK.k,k.trim());setAk(k.trim());};
  const inc=()=>{const n=tr+1;localStorage.setItem(SK.t,String(n));setTr(n);};
  return e('div',null,
    sc==='home'&&e(Home,{apiKey:ak,tl:MAX-tr,bl:tr>=MAX,inc,go:setSc}),
    sc==='settings'&&e(Sett,{apiKey:ak,save:sv,go:setSc}),
    sc==='paywall'&&e(Pay,{go:setSc})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
